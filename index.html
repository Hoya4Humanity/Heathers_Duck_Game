<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Heather’s Duck Game 🪠🦆</title>
  <style>
    :root{
      --bg1:#0b2a3a;
      --bg2:#0e6a87;
      --panel: rgba(0,0,0,.35);
      --text: #eaf7ff;
      --accent: #ffda4a;
      --danger: #ff4a6e;
      --ok: #53f3a3;
      --shadow: rgba(0,0,0,.35);
    }
    *{ box-sizing: border-box; }
    html,body{ height:100%; margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; background:#071a25; color:var(--text); }
    .wrap{
      height:100%;
      display:grid;
      grid-template-rows:auto 1fr auto;
      background:
        radial-gradient(1200px 800px at 30% 20%, rgba(255,255,255,.08), transparent 60%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      overflow:hidden;
    }
    header{
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      padding:10px 12px;
      background:var(--panel);
      backdrop-filter: blur(6px);
      border-bottom:1px solid rgba(255,255,255,.10);
    }
    header .left{ display:flex; align-items:baseline; gap:12px; }
    header h1{ margin:0; font-size:16px; letter-spacing:.2px; }
    header .sub{ opacity:.85; font-size:12px; }
    .hud{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
      font-size:12px;
    }
    .pill{
      background: rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.12);
      border-radius:999px;
      padding:6px 10px;
      display:flex;
      gap:8px;
      align-items:center;
      box-shadow: 0 6px 18px var(--shadow);
      user-select:none;
      white-space:nowrap;
    }
    .pill strong{ font-weight:800; }
    .pill.danger{
      border-color: rgba(255,74,110,.35);
      background: rgba(255,74,110,.14);
    }
    .btn{
      cursor:pointer;
      border:1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.12);
      color:var(--text);
      border-radius:12px;
      padding:10px 12px;
      font-size:13px;
      box-shadow: 0 6px 18px var(--shadow);
      transition: transform .08s ease, background .12s ease;
      user-select:none;
    }
    .btn:hover{ background: rgba(255,255,255,.16); }
    .btn:active{ transform: translateY(1px) scale(.99); }
    .btn.primary{ border-color: rgba(255,218,74,.55); background: rgba(255,218,74,.22); }
    .btn.danger{ border-color: rgba(255,74,110,.45); background: rgba(255,74,110,.18); }

    main{ position:relative; display:grid; place-items:center; padding:10px; }

    /* Stage wrapper */
    .stage{
      width:min(980px, 96vw);
      aspect-ratio: 16/9;
      border-radius:20px;
      position:relative;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.14);
      box-shadow: 0 18px 70px rgba(0,0,0,.35);
      background:
        radial-gradient(900px 600px at 70% 40%, rgba(255,255,255,.10), transparent 65%),
        radial-gradient(700px 450px at 30% 70%, rgba(255,255,255,.08), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(0,0,0,.12));
      touch-action:none;
    }

    /* Canvas stays below overlay */
    canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index: 1;
    }

    .ripples{
      position:absolute; inset:0;
      z-index: 2;
      background:
        repeating-radial-gradient(circle at 20% 30%, rgba(255,255,255,.06) 0 2px, transparent 2px 18px),
        repeating-radial-gradient(circle at 70% 60%, rgba(255,255,255,.05) 0 2px, transparent 2px 22px);
      opacity:.30;
      mix-blend-mode: overlay;
      pointer-events:none;
      animation: drift 8s linear infinite;
    }
    @keyframes drift{
      from{ transform: translate3d(0,0,0) }
      to{ transform: translate3d(-40px, 18px, 0) }
    }

    /* Overlay ALWAYS on top */
    .overlay{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      z-index: 10;
      pointer-events:none; /* default pass-through */
    }
    .overlay.active{ pointer-events:auto; }

    .card{
      width:min(640px, 92%);
      border-radius:18px;
      padding:16px 16px 14px;
      background: rgba(0,0,0,.52);
      border:1px solid rgba(255,255,255,.14);
      backdrop-filter: blur(10px);
      box-shadow: 0 16px 50px rgba(0,0,0,.45);
      text-align:center;
      pointer-events:auto;
    }
    .card h2{ margin:0 0 8px; font-size:18px; letter-spacing:.2px; }
    .card p{ margin:0 0 12px; opacity:.92; font-size:13px; line-height:1.35; }
    .row{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
    .small{ font-size:12px; opacity:.88; }

    .toast{
      position:absolute;
      left:50%;
      bottom:14px;
      transform: translateX(-50%);
      z-index: 9;
      background: rgba(0,0,0,.45);
      border:1px solid rgba(255,255,255,.14);
      padding:8px 10px;
      border-radius:12px;
      font-size:12px;
      opacity:0;
      pointer-events:none;
      transition: opacity .25s ease, transform .25s ease;
      box-shadow: 0 12px 34px rgba(0,0,0,.35);
      max-width:min(720px, 92%);
      text-align:center;
    }
    .toast.show{
      opacity:1;
      transform: translateX(-50%) translateY(-4px);
    }

    footer{
      padding:10px 12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      background: rgba(0,0,0,.22);
      border-top:1px solid rgba(255,255,255,.10);
      font-size:12px;
      opacity:.9;
    }
    footer kbd{
      background: rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.12);
      border-bottom-width:2px;
      border-radius:8px;
      padding:2px 6px;
      font-size:11px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="left">
        <h1>Heather’s Duck Game 🪠🦆</h1>
        <div class="sub">BONK ducks, BOINK bosses, beat the clock ⏱️</div>
      </div>
      <div class="hud">
        <div class="pill">Level <strong id="levelLabel">1</strong></div>
        <div class="pill">Targets <strong id="targetsLabel">0</strong></div>
        <div class="pill">Score <strong id="scoreLabel">0</strong></div>
        <div class="pill" id="timePill">Time <strong id="timeLabel">0:00</strong></div>
        <div class="pill">🧻 TP <strong id="tpLabel">Ready</strong></div>
        <div class="pill" id="bossPill" style="display:none;">BOSS <strong id="bossLabel">❤️</strong></div>
        <button class="btn" id="muteBtn" type="button">🔊 Sound</button>
        <button class="btn danger" id="resetBtn" type="button">Reset</button>
      </div>
    </header>

    <main>
      <div class="stage" id="stage" aria-label="Game area">
        <canvas id="canvas"></canvas>
        <div class="ripples"></div>
        <div class="overlay" id="overlay"></div>
        <div class="toast" id="toast"></div>
      </div>
    </main>

    <footer>
      <div>
        Controls: click/tap 🪠 | double-tap 🧻 | <kbd>Space</kbd> pause | <kbd>R</kbd> reset | <kbd>M</kbd> mute
      </div>
      <div>
        Boss every 3 levels 🥊🦆
      </div>
    </footer>
  </div>

<script>
(() => {
  'use strict';

  // ---------- DOM
  const stage = document.getElementById('stage');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d', { alpha: true });

  const overlay = document.getElementById('overlay');
  const toastEl = document.getElementById('toast');

  const levelLabel = document.getElementById('levelLabel');
  const targetsLabel = document.getElementById('targetsLabel');
  const scoreLabel = document.getElementById('scoreLabel');
  const timeLabel = document.getElementById('timeLabel');
  const timePill = document.getElementById('timePill');
  const tpLabel = document.getElementById('tpLabel');
  const bossPill = document.getElementById('bossPill');
  const bossLabel = document.getElementById('bossLabel');

  const resetBtn = document.getElementById('resetBtn');
  const muteBtn = document.getElementById('muteBtn');

  // ---------- Utils
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const rand = (a, b) => Math.random() * (b - a) + a;
  const now = () => performance.now();
  const fmtTime = (sec) => {
    const s = Math.max(0, Math.ceil(sec));
    const m = Math.floor(s / 60);
    const r = s % 60;
    return `${m}:${String(r).padStart(2,'0')}`;
  };

  // ---------- Overlay control (HARDENED)
  function setOverlay(html) {
    overlay.innerHTML = html;
    const active = !!html && html.trim().length > 0;
    overlay.classList.toggle('active', active);
  }
  function hideOverlay() { setOverlay(''); }
  function overlayActive() { return overlay.classList.contains('active'); }

  // If overlay is active, stop clicks from falling through
  overlay.addEventListener('pointerdown', (e) => { if (e.target === overlay) e.stopPropagation(); }, true);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) e.stopPropagation(); }, true);

  // ---------- Toast
  let toastTimer = null;
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1400);
  }

  // ---------- Audio (tiny beeps, optional)
  let audioCtx = null;
  const state = {
    muted: false,
    running: false,
    paused: false,
    level: 1,
    score: 0,

    timeLeft: 0,
    levelTime: 0,

    ducks: [],
    boss: null,

    tpCooldown: 2.5,
    tpReadyAt: 0,

    lastT: now(),

    // input
    pointer: {x: 0, y: 0},
  };

  function ensureAudio() {
    if (state.muted) return null;
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      audioCtx = new AC();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
    return audioCtx;
  }
  function beep(type='hit') {
    const ac = ensureAudio();
    if (!ac) return;
    const t0 = ac.currentTime;
    const o = ac.createOscillator();
    const g = ac.createGain();
    const cfg = {
      hit: {f1:220,f2:90,d:0.08,w:'square',a:0.10},
      special:{f1:520,f2:180,d:0.10,w:'triangle',a:0.10},
      win:{f1:660,f2:990,d:0.16,w:'triangle',a:0.08},
      lose:{f1:120,f2:50,d:0.20,w:'sawtooth',a:0.06},
      click:{f1:420,f2:300,d:0.06,w:'sine',a:0.06},
      boss:{f1:180,f2:60,d:0.14,w:'sawtooth',a:0.08}
    }[type] || {f1:240,f2:140,d:0.08,w:'sine',a:0.06};

    o.type = cfg.w;
    o.frequency.setValueAtTime(cfg.f1, t0);
    o.frequency.exponentialRampToValueAtTime(cfg.f2, t0 + cfg.d);
    g.gain.setValueAtTime(cfg.a, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + cfg.d);
    o.connect(g); g.connect(ac.destination);
    o.start(t0); o.stop(t0 + cfg.d);
  }

  function resize() {
    const r = stage.getBoundingClientRect();
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    canvas.width = Math.floor(r.width * dpr);
    canvas.height = Math.floor(r.height * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);

  // ---------- Difficulty + bosses
  function isBossLevel(level){ return level % 3 === 0; }
  function ducksForLevel(level){
    const base = 4;
    const growth = Math.floor(Math.pow(level, 0.85) * 2.2);
    return clamp(base + growth, 4, 44);
  }
  function speedForLevel(level){ return clamp(0.55 + level * 0.045, 0.55, 2.1); }
  function timeForLevel(level){
    const t = 28 - Math.pow(level, 0.65) * 2.2;
    return clamp(t, 12, 32);
  }
  function bossHPForLevel(level){
    const bossIndex = Math.floor(level / 3);
    return clamp(8 + (bossIndex - 1) * 3, 8, 25);
  }
  function bossTimeForLevel(level){
    const t = 24 - Math.pow(level, 0.55) * 1.6;
    return clamp(t, 14, 26);
  }

  function bossHearts(hp, max){
    const hm = Math.ceil(max/2);
    const h  = Math.ceil(hp/2);
    let s = '';
    for (let i=0;i<hm;i++) s += (i < h) ? '❤️' : '🤍';
    return s;
  }

  // ---------- HUD
  function updateHUD(){
    levelLabel.textContent = String(state.level);
    const remaining = state.boss ? `Boss` : String(state.ducks.filter(d=>d.alive).length);
    targetsLabel.textContent = remaining;
    scoreLabel.textContent = String(state.score);
    timeLabel.textContent = fmtTime(state.timeLeft);
    timePill.classList.toggle('danger', state.timeLeft <= 5);

    const tpLeft = state.tpReadyAt - now()/1000;
    tpLabel.textContent = tpLeft <= 0 ? 'Ready' : `${tpLeft.toFixed(1)}s`;

    if (state.boss) {
      bossPill.style.display = '';
      bossLabel.textContent = bossHearts(state.boss.hp, state.boss.hpMax);
    } else {
      bossPill.style.display = 'none';
    }
  }

  // ---------- Overlays
  function showStart(){
    setOverlay(`
      <div class="card">
        <h2>Heather’s Duck Game 🪠🦆</h2>
        <p>
          Click/tap to <strong>BONK</strong>.<br/>
          Double-tap to fire 🧻 and <strong>BOINK</strong>.<br/>
          Every 3 levels: boss duck 🥊🦆
        </p>
        <div class="row">
          <button class="btn primary" id="startBtn" type="button">Start</button>
          <button class="btn" id="helpBtn" type="button">Instructions</button>
        </div>
        <div class="small">If buttons don’t click, we failed the universe. (We didn’t.)</div>
      </div>
    `);

    // Bind immediately after injecting
    document.getElementById('startBtn').addEventListener('click', () => { beep('click'); startGame(); });
    document.getElementById('helpBtn').addEventListener('click', () => {
      beep('click');
      showToast('BONK 🪠 | BOINK 🧻 | Space pause | R reset | M mute');
    });
  }

  function showPause(){
    setOverlay(`
      <div class="card">
        <h2>Paused ⏸️</h2>
        <p>Time is frozen. Ducks are plotting. 🦆🧠</p>
        <div class="row">
          <button class="btn primary" id="resumeBtn" type="button">Resume</button>
          <button class="btn danger" id="resetBtn2" type="button">Reset</button>
        </div>
      </div>
    `);
    document.getElementById('resumeBtn').addEventListener('click', ()=> togglePause(false));
    document.getElementById('resetBtn2').addEventListener('click', ()=> resetGame());
  }

  function showLose(reason){
    const remain = state.boss ? `Boss HP remaining: ${state.boss.hp}` : `Ducks remaining: ${state.ducks.filter(d=>d.alive).length}`;
    setOverlay(`
      <div class="card">
        <h2>YOU GOT DUCKED 😵‍💫🦆</h2>
        <p>${reason}<br/><strong>${remain}</strong></p>
        <div class="row">
          <button class="btn primary" id="retryBtn" type="button">Replay level</button>
          <button class="btn danger" id="resetBtn3" type="button">Reset run</button>
        </div>
      </div>
    `);
    document.getElementById('retryBtn').addEventListener('click', ()=> { beep('click'); resumeLevel(state.level); });
    document.getElementById('resetBtn3').addEventListener('click', ()=> resetGame());
  }

  function showWin(msg){
    setOverlay(`
      <div class="card">
        <h2>${msg}</h2>
        <p>Score: <strong>${state.score}</strong> ✨</p>
        <div class="row">
          <button class="btn primary" id="nextBtn" type="button">Next level</button>
          <button class="btn" id="replayBtn" type="button">Replay</button>
        </div>
      </div>
    `);
    document.getElementById('nextBtn').addEventListener('click', ()=> { beep('click'); state.level++; resumeLevel(state.level); });
    document.getElementById('replayBtn').addEventListener('click', ()=> { beep('click'); resumeLevel(state.level); });
  }

  function showBossIntro(level, hp){
    setOverlay(`
      <div class="card">
        <h2>BOSS DUCK INCOMING!! 🦆💢</h2>
        <p>Hit it <strong>${hp}</strong> times before the timer hits 0 ⏱️</p>
        <div class="row">
          <button class="btn primary" id="fightBtn" type="button">FIGHT!</button>
        </div>
      </div>
    `);
    document.getElementById('fightBtn').addEventListener('click', ()=>{
      beep('click');
      hideOverlay();
      state.paused = false;
      state.lastT = now();
      requestAnimationFrame(loop);
    });
  }

  // ---------- Level spawn
  function spawnNormal(level){
    state.boss = null;
    state.ducks = [];
    const w = stage.clientWidth;
    const h = stage.clientHeight;
    const count = ducksForLevel(level);
    const speed = speedForLevel(level);
    for (let i=0;i<count;i++){
      const ang = rand(0, Math.PI*2);
      state.ducks.push({
        x: rand(40, w-40),
        y: rand(40, h-40),
        r: rand(18, 26),
        vx: Math.cos(ang) * rand(40, 85) * speed,
        vy: Math.sin(ang) * rand(40, 85) * speed,
        alive: true
      });
    }
    state.levelTime = timeForLevel(level);
    state.timeLeft = state.levelTime;
    showToast(`Level ${level} • BONK ${count} ducks 🦆`);
  }

  function spawnBoss(level){
    const w = stage.clientWidth;
    const h = stage.clientHeight;
    const hp = bossHPForLevel(level);
    state.ducks = [];
    state.boss = {
      x: w*0.5, y: h*0.5, r: 70,
      vx: rand(-140,140), vy: rand(-120,120),
      hpMax: hp, hp: hp,
      mode: 'idle', t: 0
    };
    state.levelTime = bossTimeForLevel(level);
    state.timeLeft = state.levelTime;
    showBossIntro(level, hp);
  }

  function resumeLevel(level){
    state.running = true;
    state.paused = false;
    state.tpReadyAt = now()/1000 + 0.4;
    if (isBossLevel(level)) { spawnBoss(level); state.paused = true; }
    else { spawnNormal(level); hideOverlay(); state.lastT = now(); requestAnimationFrame(loop); }
    updateHUD();
  }

  // ---------- Input (HARDENED: ignore stage input while overlay is active)
  function stagePoint(e){
    const r = stage.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }

  function tpReady(){ return (now()/1000) >= state.tpReadyAt; }
  function spendTP(){ state.tpReadyAt = now()/1000 + state.tpCooldown; }

  function bonkAt(x,y){
    if (!state.running || state.paused) return;

    if (state.boss) {
      const b = state.boss;
      if (Math.hypot(b.x-x, b.y-y) <= b.r) {
        b.hp -= 1;
        state.score += 12;
        beep('boss');
        showToast('BONK! 🪠');
        if (b.hp <= 0) { state.paused = true; beep('win'); state.score += 150; updateHUD(); showWin('BOSS DOWN!! 🥊🦆💥'); }
      }
      updateHUD();
      return;
    }

    let hit = null;
    for (const d of state.ducks){
      if (!d.alive) continue;
      if (Math.hypot(d.x-x, d.y-y) <= d.r) { hit = d; break; }
    }
    if (hit){
      hit.alive = false;
      state.score += 10;
      beep('hit');
      showToast('BONK! 🪠');
      if (state.ducks.every(d=>!d.alive)) { state.paused = true; beep('win'); state.score += 60; updateHUD(); showWin('LAKE CLEARED ✅🦆✨'); }
      updateHUD();
    }
  }

  function boinkAt(x,y){
    if (!state.running || state.paused) return;
    if (!tpReady()) { showToast('🧻 reloading...'); return; }
    spendTP();

    if (state.boss){
      const b = state.boss;
      if (Math.hypot(b.x-x, b.y-y) <= b.r*1.15) {
        b.hp -= 2;
        state.score += 25;
        beep('boss');
        showToast('BOINK! 🧻🌀');
        if (b.hp <= 0) { state.paused = true; beep('win'); state.score += 150; updateHUD(); showWin('BOSS WRAPPED!! 🧻🦆💥'); }
        updateHUD();
        return;
      }
      showToast('BOINK! 🧻 (miss)');
      updateHUD();
      return;
    }

    // find nearest duck
    let best = null, bestD = 1e9;
    for (const d of state.ducks){
      if (!d.alive) continue;
      const dd = Math.hypot(d.x-x, d.y-y);
      if (dd < bestD) { bestD = dd; best = d; }
    }
    if (best && bestD <= best.r*1.8){
      best.alive = false;
      state.score += 18;
      beep('special');
      showToast('BOINK! 🧻 (captured)');
      if (state.ducks.every(d=>!d.alive)) { state.paused = true; beep('win'); state.score += 60; updateHUD(); showWin('LAKE CLEARED ✅🦆✨'); }
      updateHUD();
    } else {
      beep('special');
      showToast('BOINK! 🧻 (hit nothing but air)');
      updateHUD();
    }
  }

  // Click / dblclick
  stage.addEventListener('click', (e)=>{
    if (overlayActive()) return;
    const p = stagePoint(e);
    bonkAt(p.x,p.y);
  });
  stage.addEventListener('dblclick', (e)=>{
    if (overlayActive()) return;
    e.preventDefault();
    const p = stagePoint(e);
    boinkAt(p.x,p.y);
  });

  // mobile double-tap
  let lastTapT=0, lastX=0, lastY=0;
  stage.addEventListener('pointerdown', (e)=>{
    if (overlayActive()) return;
    const p = stagePoint(e);
    const t = now();
    const dt = t - lastTapT;
    const dist = Math.hypot(p.x-lastX, p.y-lastY);
    if (dt < 260 && dist < 28) {
      boinkAt(p.x,p.y);
      lastTapT = 0;
    } else {
      lastTapT = t; lastX = p.x; lastY = p.y;
    }
    state.pointer.x = p.x; state.pointer.y = p.y;
  });

  // keyboard
  window.addEventListener('keydown', (e)=>{
    const k = e.key.toLowerCase();
    if (k === ' ') { e.preventDefault(); togglePause(); }
    if (k === 'r') resetGame();
    if (k === 'm') toggleMute();
  });

  function toggleMute(){
    state.muted = !state.muted;
    muteBtn.textContent = state.muted ? '🔇 Muted' : '🔊 Sound';
    showToast(state.muted ? 'Muted.' : 'Sound on.');
    if (!state.muted) ensureAudio();
  }

  muteBtn.addEventListener('click', ()=> toggleMute());
  resetBtn.addEventListener('click', ()=> resetGame());

  function togglePause(force){
    if (!state.running) return;
    state.paused = (typeof force === 'boolean') ? !force : !state.paused;
    if (state.paused) { beep('click'); showPause(); }
    else { beep('click'); hideOverlay(); state.lastT = now(); requestAnimationFrame(loop); }
  }

  function startGame(){
    hideOverlay();
    state.level = 1;
    state.score = 0;
    state.running = true;
    state.paused = false;
    state.tpReadyAt = now()/1000;
    resize();
    resumeLevel(state.level);
  }

  function resetGame(){
    beep('click');
    state.running = false;
    state.paused = false;
    state.level = 1;
    state.score = 0;
    state.ducks = [];
    state.boss = null;
    state.timeLeft = 0;
    updateHUD();
    showStart();
  }

  // ---------- Update/render
  function update(dt){
    state.timeLeft -= dt;
    if (state.timeLeft <= 0){
      state.timeLeft = 0;
      state.paused = true;
      beep('lose');
      updateHUD();
      showLose("Time’s up ⏱️");
      return;
    }

    const w = stage.clientWidth, h = stage.clientHeight;
    const pad = 18;

    // boss movement
    if (state.boss){
      const b = state.boss;
      b.x += b.vx*dt; b.y += b.vy*dt;
      if (b.x < pad+b.r || b.x > w-pad-b.r) b.vx *= -1;
      if (b.y < pad+b.r || b.y > h-pad-b.r) b.vy *= -1;
      bossLabel.textContent = bossHearts(b.hp, b.hpMax);
    }

    // ducks movement
    for (const d of state.ducks){
      if (!d.alive) continue;
      d.x += d.vx*dt; d.y += d.vy*dt;
      if (d.x < pad+d.r || d.x > w-pad-d.r) d.vx *= -1;
      if (d.y < pad+d.r || d.y > h-pad-d.r) d.vy *= -1;
    }

    updateHUD();
  }

  function render(){
    const w = stage.clientWidth, h = stage.clientHeight;
    ctx.clearRect(0,0,w,h);

    // draw ducks
    for (const d of state.ducks){
      if (!d.alive) continue;
      ctx.fillStyle = 'rgba(255, 220, 80, .95)';
      ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(0,0,0,.8)';
      ctx.beginPath(); ctx.arc(d.x+d.r*0.25,d.y-d.r*0.2,3,0,Math.PI*2); ctx.fill();
    }

    // draw boss
    if (state.boss){
      const b = state.boss;
      ctx.fillStyle = 'rgba(255, 200, 60, .98)';
      ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(0,0,0,.85)';
      ctx.beginPath(); ctx.arc(b.x+b.r*0.25,b.y-b.r*0.2,7,0,Math.PI*2); ctx.fill();
      ctx.font = 'bold 18px system-ui';
      ctx.fillText('💢', b.x-b.r*0.2, b.y-b.r*0.8);
    }
  }

  function loop(t){
    if (!state.running || state.paused) return;
    const dt = clamp((t - state.lastT)/1000, 0, 0.033);
    state.lastT = t;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }

  // ---------- Boot
  function boot(){
    resize();
    updateHUD();
    showStart();
    // keep a gentle render loop when paused so you see something
    const idle = () => { if (!state.running || state.paused) render(); requestAnimationFrame(idle); };
    requestAnimationFrame(idle);
  }

  boot();
})();
</script>
</body>
</html>
